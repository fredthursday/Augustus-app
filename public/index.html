<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Augustus</title>
<meta name="theme-color" content="#5C4424" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  :root {
    --bg: #F4EFE3;
    --panel: #FBF8F1;
    --border: #E5D9BE;
    --ink: #3A2D17;
    --ink-soft: #7A6A4D;
    --ink-faint: #9C8B6B;
    --ink-faintest: #B5A584;
    --accent: #5C4424;
    --accent-soft: #9C7A4E;
    --warn: #B5651D;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { position: relative; height: 100vh; height: 100dvh; width: 100%; display: flex; flex-direction: column; }

  /* Onboarding */
  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    background: rgba(58,45,23,0.4); padding: 0 24px;
  }
  .overlay-card {
    width: 100%; max-width: 360px; border-radius: 16px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  }
  .overlay-card h1 { font-size: 17px; font-weight: 600; margin: 12px 0 4px; }
  .overlay-card p { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin: 0 0 16px; }
  .overlay-card input {
    width: 100%; border-radius: 8px; border: 1px solid var(--border);
    background: #fff; padding: 10px 12px; font-size: 14px; outline: none;
    margin-bottom: 12px;
  }
  .overlay-card input:focus { border-color: var(--accent-soft); }
  .overlay-card button.primary {
    width: 100%; border-radius: 8px; border: none; background: var(--accent);
    color: var(--panel); font-size: 14px; font-weight: 500; padding: 10px; cursor: pointer;
  }
  .overlay-card button.primary:disabled { opacity: 0.4; cursor: default; }
  .overlay-card label { font-size: 12px; color: var(--ink-faint); display: block; margin: 14px 0 4px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .header-title { font-size: 14px; font-weight: 600; line-height: 1.2; }
  .header-sub { font-size: 11.5px; color: var(--ink-faint); line-height: 1.2; }
  header button.ledger-toggle {
    display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-soft);
    background: none; border: none; padding: 6px 8px; border-radius: 8px; cursor: pointer;
  }

  /* Ledger panel */
  #ledgerPanel {
    border-bottom: 1px solid var(--border); background: var(--panel);
    padding: 12px 16px; max-height: 176px; overflow-y: auto; display: none;
  }
  #ledgerPanel.open { display: block; }
  .trait-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .trait-chip {
    display: flex; align-items: center; gap: 6px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel);
    padding: 4px 12px; font-size: 12px; color: var(--accent);
  }
  .trait-chip button { background: none; border: none; cursor: pointer; color: var(--ink-faintest); padding: 0; display: flex; }
  .empty-note { font-size: 12.5px; color: var(--ink-faint); margin: 0; }
  .reset-btn {
    display: flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--ink-faintest);
    background: none; border: none; cursor: pointer; margin-top: 4px; padding: 0;
  }
  .reset-btn:hover { color: var(--warn); }
  .storage-warn { font-size: 12px; color: var(--warn); margin: 0 0 8px; }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 0 24px; color: var(--ink-faintest);
  }
  .empty-state p { font-size: 13px; max-width: 220px; margin: 8px 0 0; }
  .msg-row { display: flex; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg-col { max-width: 82%; display: flex; flex-direction: column; gap: 6px; }
  .bubble { border-radius: 16px; padding: 10px 16px; font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; }
  .bubble.user { background: var(--accent); color: var(--panel); border-bottom-right-radius: 6px; }
  .bubble.assistant { background: var(--panel); color: var(--ink); border: 1px solid var(--border); border-bottom-left-radius: 6px; }
  .fb-row { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
  .fb-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; color: var(--ink-faintest); display: flex; }
  .fb-btn.active-up { background: rgba(156,122,78,0.2); color: var(--accent); }
  .fb-btn.active-down { background: rgba(181,101,29,0.15); color: var(--warn); }
  .fb-note-tag { font-size: 11px; color: var(--ink-faintest); font-style: italic; }

  .note-prompt {
    display: flex; align-items: center; gap: 8px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--panel); padding: 8px 12px; max-width: 82%;
  }
  .note-prompt input { flex: 1; border: none; background: transparent; font-size: 13px; outline: none; }
  .note-prompt button { font-size: 12px; background: none; border: none; cursor: pointer; }
  .note-prompt button.save { color: var(--accent); font-weight: 500; }
  .note-prompt button.skip { color: var(--ink-faintest); }

  /* Composer */
  .composer { border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
  .composer-row { display: flex; align-items: flex-end; gap: 8px; }
  .composer textarea {
    flex: 1; resize: none; border-radius: 16px; border: 1px solid var(--border);
    background: var(--panel); padding: 10px 16px; font-size: 14px; outline: none;
    max-height: 112px; font-family: inherit;
  }
  .composer textarea:focus { border-color: var(--accent-soft); }
  .composer button.send {
    flex-shrink: 0; border-radius: 999px; background: var(--accent); color: var(--panel);
    border: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .composer button.send:disabled { opacity: 0.4; cursor: default; }

  /* Setup screen for API key */
  .setup-screen { height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .setup-card { max-width: 420px; }
  .setup-card h1 { font-size: 20px; margin-bottom: 8px; }
  .setup-card p { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
  .setup-card a { color: var(--accent); }
  .setup-card code { background: var(--panel); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/app.js"></script>
</body>
</html>
